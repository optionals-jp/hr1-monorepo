name: CI

on:
  pull_request:
    branches: [main]

jobs:
  console:
    name: Console (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hr1-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hr1-console/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  employee-app:
    name: Employee App (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hr1-employee-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  applicant-app:
    name: Applicant App (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hr1-applicant-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
