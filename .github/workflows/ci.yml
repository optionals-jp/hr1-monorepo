name: CI

on:
  pull_request:
    branches: [main]

jobs:
  console:
    name: Console (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check --workspace=hr1-console
      - run: npm run lint --workspace=hr1-console
      - run: npm run test --workspace=hr1-console
      - run: npm run build --workspace=hr1-console

  admin:
    name: Admin (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=hr1-admin

  employee-web:
    name: Employee Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check --workspace=hr1-employee-web
      - run: npm run lint --workspace=hr1-employee-web
      - run: npm run build --workspace=hr1-employee-web

  employee-app:
    name: Employee App (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hr1-employee-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  applicant-app:
    name: Applicant App (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hr1-applicant-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
