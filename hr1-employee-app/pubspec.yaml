name: hr1_employee_app
description: "HR1 - 社員向けモバイルアプリ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7
  flutter: ">=3.41.7"

dependencies:
  flutter:
    sdk: flutter

  # 状態管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # バックエンド
  supabase_flutter: ^2.8.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.2
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # ルーティング
  go_router: ^14.6.2

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  flutter_markdown: ^0.7.6
  shimmer: ^3.0.0
  lottie: ^3.3.1
  fluttertoast: ^8.2.8

  # ネットワーク
  dio: ^5.7.0

  # データモデル
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 国際化
  intl: ^0.19.0

  # フォント
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8

  # 共有パッケージ
  hr1_shared:
    path: ../hr1-shared

  # 画像選択
  image_picker: ^1.1.0

  # ファイル選択（メッセージ添付）
  file_picker: ^11.0.0

  # OCR（名刺読み取り）
  google_mlkit_text_recognition: ^0.14.0

  # URL起動
  url_launcher: ^6.3.1

  # ローカル永続化（HR-28 follow-up: activeOrganizationId 保存）
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # コード生成
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # リント
  flutter_lints: ^5.0.0

  # アイコン生成
  flutter_launcher_icons: ^0.14.3

  firebase_core_platform_interface: any

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icon/
    - assets/animations/
